plugins:
  - rubocop-rake
  - rubocop-rspec
  - rubocop-performance

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4

# Early-Ruby rule: leave off optional syntax unless it's needed to remove ambiguity, so we keep
# paren-less method definitions (def foo param).
Style/MethodDefParentheses:
  Enabled: false

# We keep paren-less method definitions (above), but anonymous forwarding (&, ...) *requires*
# parentheses and reads cryptically. Prefer the explicit named form (&block, *args): it's
# self-documenting, consistent with our def style, and kinder to someone reading the code cold.
Naming/BlockForwarding:
  EnforcedStyle: explicit
Style/ArgumentsForwarding:
  UseAnonymousForwarding: false

# Our chart, downloader, and file-system hierarchies share method signatures (grouping hooks, the
# download interface, the FileSystem contract the mock implements). A given override often doesn't
# use every keyword, but the name is part of the caller-facing contract, so it can't be dropped or
# renamed to _foo. Allow unused keyword arguments rather than disabling the cop case by case.
Lint/UnusedMethodArgument:
  AllowUnusedKeywordArguments: true

# x and y are coordinate names in our trend/line math, where single letters read clearest and match
# the formulae they implement. Allow them alongside the cop's default short-name allowlist.
inherit_mode:
  merge:
    - AllowedNames
Naming/MethodParameterName:
  AllowedNames:
    - x
    - y

# We intentionally group small, tightly-related classes/modules in a single file.
Style/OneClassPerFile:
  Enabled: false

# Although I generally agree that these are a bad practice, we're making an exception in order
# to create a DSL
Style/ClassVars:
  Enabled: false

# We don't require a doc comment on every class/module: a mandatory comment would mostly restate an
# already-clear class name (against our why-not-what rule) and fire on tiny Structs. Key classes get
# documented deliberately (see the architecture doc), not by fiat.
Style/Documentation:
  Enabled: false

# We like the `x = if ... end` idiom, but the cop's autocorrect (and the EndAlignment reflow it
# needs) mangles branches that contain comments, so we don't enforce it across the codebase.
Style/ConditionalAssignment:
  Enabled: false

# Keep $1/$2 for now rather than the verbose ::Regexp.last_match the autocorrect produces. The real
# modernization is named captures, tracked separately, so leave the cop off until that's done.
Style/PerlBackrefs:
  Enabled: false

# We write the inner call paren-less -- foo(bar baz), not foo(bar(baz)) -- following our usual
# "leave off optional syntax" rule, which this cop would fight.
Style/NestedParenthesizedCalls:
  Enabled: false

# "A method should fit on screen without scrolling." Subjective, so we set a generous ceiling
# rather than the default 10.
Metrics/MethodLength:
  Max: 40
  # The examples/ files are copy-me quick-start templates; their flat, self-contained form is the
  # feature (the docs tell users to read the source and adapt it), so the size/complexity metrics and
  # the redundant-parens style below don't apply to them. Everything else still lints them.
  Exclude:
    - 'lib/jirametrics/examples/**/*'

Metrics/CyclomaticComplexity:
  Exclude:
    - 'lib/jirametrics/examples/**/*'

Metrics/PerceivedComplexity:
  Exclude:
    - 'lib/jirametrics/examples/**/*'

Style/RedundantParentheses:
  Exclude:
    - 'lib/jirametrics/examples/**/*'

# Disabled by decision, not deferral. AbcSize scores methods by sheer volume of assignments, branches,
# and calls -- not by tangled logic. We sampled the worst offenders (the data-quality scan/render
# orchestration, the ADF node-type case dispatch, chart wiring/DI) and every one is flat, wide, and
# perfectly readable whole -- the same "breadth, not depth" shapes we already exempt from the complexity
# cops by design. Across ~124 hits it's overwhelmingly "reads fine, just does a lot," so enabling it
# would only manufacture documented-disable ceremony without improving a single method. Left off for good.
Metrics/AbcSize:
  Enabled: false

# Only count positional parameters. A method with many named keyword arguments (our DSL/config style)
# is self-documenting at the call site, so keyword args don't count toward the limit.
Metrics/ParameterLists:
  CountKeywordArgs: false

# Off: a cohesive class (e.g. Issue) belongs in one place even when it's large. We fundamentally
# disagree with splitting a class across files just to satisfy a line count.
Metrics/ClassLength:
  Enabled: false

# Off: our config-block DSL and chart-rendering blocks are legitimately long; capping block length
# would fight that style.
Metrics/BlockLength:
  Enabled: false

# We lay code out by hand -- lining up columns in data tables, choosing our own multiline
# indentation -- because it reads better than the machine-enforced version. So we turn off the
# Layout cops that would fight that. Trade-off: less machine-enforced consistency, accepted for
# readability.
Layout/ExtraSpacing:
  Enabled: false
Layout/SpaceInsideArrayLiteralBrackets:
  Enabled: false
Layout/FirstArrayElementIndentation:
  Enabled: false
Layout/FirstHashElementIndentation:
  Enabled: false
Layout/HashAlignment:
  Enabled: false
Layout/ArrayAlignment:
  Enabled: false
Layout/ArgumentAlignment:
  Enabled: false
Layout/ParameterAlignment:
  Enabled: false
Layout/BlockAlignment:
  Enabled: false
Layout/EndAlignment:
  Enabled: false
Layout/CaseIndentation:
  Enabled: false
Layout/MultilineHashBraceLayout:
  Enabled: false
Layout/MultilineMethodCallIndentation:
  Enabled: false
Layout/MultilineOperationIndentation:
  Enabled: false
Layout/LineEndStringConcatenationIndentation:
  Enabled: false
Layout/LineContinuationLeadingSpace:
  Enabled: false

# This may be a bug in rubocop. It recommends things that actually change the behaviour.
Lint/NonAtomicFileOperation:
  Enabled: false

# Numbered lets are intentional: the digit maps to the Jira fixture key
# (issue1 -> SP-1, issue10 -> SP-10), so the name identifies specific test data.
RSpec/IndexedLet:
  Enabled: false

# Behaviour tests often need substantial setup and several related assertions, so we don't cap
# example length.
RSpec/ExampleLength:
  Enabled: false

# We group related assertions in one example with aggregate_failures rather than splitting into
# many single-assertion examples.
RSpec/MultipleExpectations:
  Enabled: false

# Some specs legitimately need several let helpers to build a realistic fixture.
RSpec/MultipleMemoizedHelpers:
  Enabled: false
